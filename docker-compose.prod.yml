services:
  app:
    image: ghcr.io/ongudai-camp/oigudai-camp:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    volumes:
      - uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000

volumes:
  uploads:
